<html layout:decorate="~{layout}">
<div layout:fragment="content" class="container my-3">
    <div class="my-3 border-bottom">
        <div>
            <h4>비밀번호 찾기</h4>
        </div>
    </div>
    <form th:action="@{/user/password/reset}" th:object="${passwordResetForm}" method="post">
        <div th:replace="~{form_errors :: formErrorsFragment}"></div>
        <div class="mb-3">
            <label for="email" class="form-label">가입 이메일</label>
            <input type="email" th:field="*{email}" class="form-control">
        </div>
        <button type="submit" class="btn btn-primary">임시 비밀번호 발송</button>
        <a th:href="@{/user/login}" class="btn btn-link">로그인</a>
    </form>
</div>
</html>
