<html layout:decorate="~{layout/base}">
<th:block layout:fragment="style" th:replace="~{layout/markdown_editor :: css}"></th:block>
<div layout:fragment="content" class="container">
    <h5 class="my-3 border-bottom pb-2">질문등록</h5>
    <form th:action="@{${formAction}}" th:object="${questionForm}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <div th:replace="~{layout/form_errors :: formErrorsFragment}"></div>
        <div class="mb-3">
            <label for="categoryCode" class="form-label">카테고리</label>
            <select th:field="*{categoryCode}" class="form-select">
                <option th:each="category : ${categoryList}"
                        th:value="${category.code}"
                        th:text="${category.name}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label for="subject" class="form-label">제목</label>
            <input type="text" th:field="*{subject}" class="form-control">
        </div>
        <div class="mb-3">
            <label for="content" class="form-label">내용</label>
            <textarea th:field="*{content}" class="form-control markdown-editor" rows="10" data-editor-height="420px"></textarea>
        </div>
        <input type="submit" value="저장하기" class="btn btn-primary my-2">
    </form>
</div>
<th:block layout:fragment="script" th:replace="~{layout/markdown_editor :: script}"></th:block>
</html>
