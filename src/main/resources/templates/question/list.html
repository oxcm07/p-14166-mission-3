<html layout:decorate="~{layout/base}">
<div layout:fragment="content" class="container my-3">
    <ul class="nav nav-tabs mb-3">
        <li class="nav-item" th:each="cate : ${categoryList}">
            <a class="nav-link"
               th:classappend="${cate.code == category.code} ? 'active'"
               th:href="@{/question/{code}/list(code=${cate.code})}"
               th:text="${cate.name}"></a>
        </li>
    </ul>
    <table class="table">
        <thead class="table-dark">
        <tr class="text-center">
            <th>번호</th>
            <th style="width:50%">제목</th>
            <th>글쓴이</th>
            <th>작성일시</th>
            <th>추천</th>
        </tr>
        </thead>
        <tbody>
        <tr class="text-center" th:each="question, loop : ${paging}">
            <td th:text="${questionNumberMap[question.id]}"></td>
            <td class="text-start">
                <div>
                    <a th:href="@{/question/{code}/detail/{number}(code=${category.code}, number=${questionNumberMap[question.id]})}"
                       th:text="${question.subject}"></a>
                </div>
                <div class="small text-muted mt-1">
                    <span th:text="|답변 : ${#lists.size(question.answerList)}|"></span>
                    <span class="ms-2" th:text="|댓글 : ${#lists.size(question.commentList)}|"></span>
                </div>
            </td>
            <td><span th:if="${question.author != null}" th:text="${question.author.username}"></span></td>
            <td th:text="${#temporals.format(question.createDate, 'yyyy-MM-dd HH:mm')}"></td>
            <td th:text="${#lists.size(question.voter)}"></td>
        </tr>
        </tbody>
    </table>
    <!-- 페이징처리 시작 -->
    <div class="row align-items-center g-2 my-3">
        <div class="col-md-3">
            <a th:href="@{/question/create(categoryCode=${category.code})}" class="btn btn-primary">질문 등록하기</a>
        </div>
        <div class="col-md-6" th:if="${!paging.isEmpty()}">
            <ul class="pagination justify-content-center mb-0">
                <li class="page-item" th:classappend="${!paging.hasPrevious} ? 'disabled'">
                    <a class="page-link" href="javascript:void(0)"
                       th:data-page="${paging.hasPrevious ? paging.number : 1}">
                        <span>이전</span>
                    </a>
                </li>
                <li th:each="page: ${#numbers.sequence(0, paging.totalPages-1)}"
                    th:if="${page >= paging.number-5 and page <= paging.number+5}"
                    th:classappend="${page == paging.number} ? 'active'" class="page-item">
                    <a th:text="${page + 1}" class="page-link" href="javascript:void(0)"
                       th:data-page="${page + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${!paging.hasNext} ? 'disabled'">
                    <a class="page-link" href="javascript:void(0)" th:data-page="${paging.number + 2}">
                        <span>다음</span>
                    </a>
                </li>
            </ul>
        </div>
        <div class="col-md-6" th:if="${paging.isEmpty()}"></div>
        <div class="col-md-3">
            <div class="input-group">
                <input type="text" id="search_kw" class="form-control" th:value="${kw}">
                <button class="btn btn-outline-secondary" type="button" id="btn_search">찾기</button>
            </div>
        </div>
    </div>
    <!-- 페이징처리 끝 -->
    <!--게시물 목록을 조회할 때는 GET 방식을 사용-->
    <form th:action="@{/question/{code}/list(code=${category.code})}" method="get" id="searchForm">
        <input type="hidden" id="kw" name="kw" th:value="${kw}">
        <input type="hidden" id="page" name="page" th:value="${paging.number + 1}">
    </form>
</div>
<script layout:fragment="script" th:src="@{/js/question/list.js}"></script>
</html>
