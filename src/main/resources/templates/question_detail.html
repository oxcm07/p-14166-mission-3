<html layout:decorate="~{layout}">
<div layout:fragment="content" class="container my-3">
    <!-- 질문 -->
    <h2 class="border-bottom py-2" th:text="${question.subject}"></h2>
    <div class="card my-3">
        <div class="card-body">
            <!--최신 타임리프는 HTML 템플릿 안에서 @beanName 형태로 스프링 빈을 직접 호출하는 기능을 기본적으로 차단-->
            <div class="card-text" th:utext="${questionContent}"></div>
            <div class="d-flex justify-content-end">
                <div th:if="${question.modifyDate != null}" class="badge bg-light text-dark p-2 text-start mx-3">
                    <div class="mb-2">modified at</div>
                    <div th:text="${#temporals.format(question.modifyDate, 'yyyy-MM-dd HH:mm')}"></div>
                </div>
                <div class="badge bg-light text-dark p-2 text-start">
                    <div class="mb-2">
                        <span th:if="${question.author != null}" th:text="${question.author.username}"></span>
                    </div>
                    <div th:text="${#temporals.format(question.createDate, 'yyyy-MM-dd HH:mm')}"></div>
                </div>
            </div>
            <div class="my-3">
                <a href="javascript:void(0);" class="recommend btn btn-sm btn-outline-secondary"
                   th:data-uri="@{|/question/vote/${question.id}|}">
                    추천
                    <span class="badge rounded-pill bg-success" th:text="${#lists.size(question.voter)}"></span>
                </a>
                <a th:href="@{|/question/modify/${question.id}|}" class="btn btn-sm btn-outline-secondary"
                   sec:authorize="isAuthenticated()"
                    <!--문자열 리터럴로 쓰려면 th:text="'수정'"처럼 따옴표를 한 번 더 넣거나, 그냥 태그 안에 수정 텍스트를 직접 넣음-->
                   th:if="${question.author != null and #authentication.getPrincipal().getUsername() == question.author.username}">수정</a>
                <a href="javascript:void(0);" th:data-uri="@{|/question/delete/${question.id}|}"
                   class="delete btn btn-sm btn-outline-secondary" sec:authorize="isAuthenticated()"
                   th:if="${question.author != null and #authentication.getPrincipal().getUsername() == question.author.username}">삭제</a>
            </div>
            <div class="border-top pt-3 mt-3">
                <div class="small text-muted mb-2" th:text="|${#lists.size(question.commentList)}개의 댓글|"></div>
                <div class="border rounded p-2 mb-2" th:each="comment : ${question.commentList}">
                    <a th:id="|comment_${comment.id}|"></a>
                    <div th:text="${comment.content}"></div>
                    <div class="d-flex justify-content-end align-items-center gap-2 mt-2">
                        <span class="small text-muted" th:if="${comment.modifyDate != null}">수정됨</span>
                        <span class="small text-muted" th:if="${comment.author != null}" th:text="${comment.author.username}"></span>
                        <span class="small text-muted" th:text="${#temporals.format(comment.createDate, 'yyyy-MM-dd HH:mm')}"></span>
                        <a th:href="@{/comment/modify/{id}(id=${comment.id}, answerPage=${answerPaging.number}, answerSort=${answerSort})}"
                           class="btn btn-sm btn-outline-secondary"
                           sec:authorize="isAuthenticated()"
                           th:if="${comment.author != null and #authentication.getPrincipal().getUsername() == comment.author.username}">수정</a>
                        <a href="javascript:void(0);"
                           th:data-uri="@{/comment/delete/{id}(id=${comment.id}, answerPage=${answerPaging.number}, answerSort=${answerSort})}"
                           class="delete btn btn-sm btn-outline-secondary"
                           sec:authorize="isAuthenticated()"
                           th:if="${comment.author != null and #authentication.getPrincipal().getUsername() == comment.author.username}">삭제</a>
                    </div>
                </div>
                <form sec:authorize="isAuthenticated()"
                      th:action="@{/comment/create/question/{id}(id=${question.id}, answerPage=${answerPaging.number}, answerSort=${answerSort})}"
                      method="post" class="mt-2">
                    <textarea name="content" class="form-control" rows="2" placeholder="댓글을 입력하세요" required></textarea>
                    <input type="submit" value="댓글등록" class="btn btn-sm btn-outline-secondary mt-2">
                </form>
            </div>
        </div>
    </div>
    <!-- 답변의 갯수 표시 -->
    <div class="d-flex justify-content-between align-items-center border-bottom my-3 py-2">
        <h5 class="mb-0" th:text="|${answerPaging.totalElements}개의 답변이 있습니다.|"></h5>
        <select id="answer_sort" class="form-select w-auto">
            <option value="latest" th:selected="${answerSort == 'latest'}">최신순</option>
            <option value="recommend" th:selected="${answerSort == 'recommend'}">추천순</option>
            <option value="old" th:selected="${answerSort == 'old'}">오래된순</option>
        </select>
    </div>
    <!-- 답변 반복 시작 -->
    <div class="card my-3" th:each="answer : ${answerPaging}">
        <a th:id="|answer_${answer.id}|"></a> <!--앵커 태그의 id 속성은 유일한 값-->
        <div class="card-body">
            <!--이스케이프 처리를 하지 않고 출력하는 th:utext를 사용-->
            <div class="card-text" th:utext="${answerContentMap[answer.id]}"></div>
            <div class="d-flex justify-content-end">
                <div th:if="${answer.modifyDate != null}" class="badge bg-light text-dark p-2 text-start mx-3">
                    <div class="mb-2">modified at</div>
                    <div th:text="${#temporals.format(answer.modifyDate, 'yyyy-MM-dd HH:mm')}"></div>
                </div>
                <div class="badge bg-light text-dark p-2 text-start">
                    <div class="mb-2">
                        <span th:if="${answer.author != null}" th:text="${answer.author.username}"></span>
                    </div>
                    <div th:text="${#temporals.format(answer.createDate, 'yyyy-MM-dd HH:mm')}"></div>
                </div>
            </div>
            <div class="my-3">
                <a href="javascript:void(0);" class="recommend btn btn-sm btn-outline-secondary"
                   th:data-uri="@{/answer/vote/{id}(id=${answer.id}, answerPage=${answerPaging.number}, answerSort=${answerSort})}">
                    추천
                    <span class="badge rounded-pill bg-success" th:text="${#lists.size(answer.voter)}"></span>
                </a>
                <a th:href="@{/answer/modify/{id}(id=${answer.id}, answerPage=${answerPaging.number}, answerSort=${answerSort})}"
                   class="btn btn-sm btn-outline-secondary"
                   sec:authorize="isAuthenticated()"
                   th:if="${answer.author != null and #authentication.getPrincipal().getUsername() == answer.author.username}">수정</a>
                <a href="javascript:void(0);"
                   th:data-uri="@{/answer/delete/{id}(id=${answer.id}, answerPage=${answerPaging.number}, answerSort=${answerSort})}"
                   class="delete btn btn-sm btn-outline-secondary" sec:authorize="isAuthenticated()"
                   th:if="${answer.author != null and #authentication.getPrincipal().getUsername() == answer.author.username}">삭제</a>
            </div>
            <div class="border-top pt-3 mt-3">
                <div class="small text-muted mb-2" th:text="|${#lists.size(answer.commentList)}개의 댓글|"></div>
                <div class="border rounded p-2 mb-2" th:each="comment : ${answer.commentList}">
                    <a th:id="|comment_${comment.id}|"></a>
                    <div th:text="${comment.content}"></div>
                    <div class="d-flex justify-content-end align-items-center gap-2 mt-2">
                        <span class="small text-muted" th:if="${comment.modifyDate != null}">수정됨</span>
                        <span class="small text-muted" th:if="${comment.author != null}" th:text="${comment.author.username}"></span>
                        <span class="small text-muted" th:text="${#temporals.format(comment.createDate, 'yyyy-MM-dd HH:mm')}"></span>
                        <a th:href="@{/comment/modify/{id}(id=${comment.id}, answerPage=${answerPaging.number}, answerSort=${answerSort})}"
                           class="btn btn-sm btn-outline-secondary"
                           sec:authorize="isAuthenticated()"
                           th:if="${comment.author != null and #authentication.getPrincipal().getUsername() == comment.author.username}">수정</a>
                        <a href="javascript:void(0);"
                           th:data-uri="@{/comment/delete/{id}(id=${comment.id}, answerPage=${answerPaging.number}, answerSort=${answerSort})}"
                           class="delete btn btn-sm btn-outline-secondary"
                           sec:authorize="isAuthenticated()"
                           th:if="${comment.author != null and #authentication.getPrincipal().getUsername() == comment.author.username}">삭제</a>
                    </div>
                </div>
                <form sec:authorize="isAuthenticated()"
                      th:action="@{/comment/create/answer/{id}(id=${answer.id}, answerPage=${answerPaging.number}, answerSort=${answerSort})}"
                      method="post" class="mt-2">
                    <textarea name="content" class="form-control" rows="2" placeholder="댓글을 입력하세요" required></textarea>
                    <input type="submit" value="댓글등록" class="btn btn-sm btn-outline-secondary mt-2">
                </form>
            </div>
        </div>
    </div>
    <!-- 답변 반복 끝  -->
    <!-- 답변 페이징처리 시작 -->
    <div th:if="${!answerPaging.isEmpty()}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${!answerPaging.hasPrevious} ? 'disabled'">
                <a class="page-link answer-page-link" href="javascript:void(0)" th:data-page="${answerPaging.number-1}">
                    <span>이전</span>
                </a>
            </li>
            <li th:each="page: ${#numbers.sequence(0, answerPaging.totalPages-1)}"
                th:if="${page >= answerPaging.number-5 and page <= answerPaging.number+5}"
                th:classappend="${page == answerPaging.number} ? 'active'" class="page-item">
                <a th:text="${page}" class="page-link answer-page-link" href="javascript:void(0)" th:data-page="${page}"></a>
            </li>
            <li class="page-item" th:classappend="${!answerPaging.hasNext} ? 'disabled'">
                <a class="page-link answer-page-link" href="javascript:void(0)" th:data-page="${answerPaging.number+1}">
                    <span>다음</span>
                </a>
            </li>
        </ul>
    </div>
    <!-- 답변 페이징처리 끝 -->
    <form th:action="@{|/question/detail/${question.id}|}" method="get" id="answerSearchForm">
        <input type="hidden" id="answerPage" name="answerPage" th:value="${answerPaging.number}">
        <input type="hidden" id="answerSort" name="answerSort" th:value="${answerSort}">
    </form>
    <!-- 답변 작성 -->
    <form th:action="@{|/answer/create/${question.id}|}" th:object="${answerForm}" method="post" class="my-3">
        <input type="hidden" name="answerPage" th:value="${answerPaging.number}">
        <input type="hidden" name="answerSort" th:value="${answerSort}">
        <div th:replace="~{form_errors :: formErrorsFragment}"></div>
        <textarea sec:authorize="isAnonymous()" disabled th:field="*{content}" class="form-control" rows="10"></textarea>
        <textarea sec:authorize="isAuthenticated()" th:field="*{content}" class="form-control" rows="10"></textarea>
        <input type="submit" value="답변등록" class="btn btn-primary my-2">
    </form>
</div>
<script layout:fragment="script" type='text/javascript'>
    const delete_elements = document.getElementsByClassName("delete");
    Array.from(delete_elements).forEach(function(element) {
        element.addEventListener('click', function() {
            if(confirm("정말로 삭제하시겠습니까?")) {
                location.href = this.dataset.uri;
            } // JS에서 if, for, while 같은 제어문 중괄호뒤에 세미콜론 붙이지 않음
        });
    });
    const recommend_elements = document.getElementsByClassName("recommend");
    Array.from(recommend_elements).forEach(function(element) {
        element.addEventListener('click', function() {
            if(confirm("정말로 추천하시겠습니까?")) {
                location.href = this.dataset.uri;
            }
        });
    });
    const answer_page_elements = document.getElementsByClassName("answer-page-link");
    Array.from(answer_page_elements).forEach(function(element) {
        element.addEventListener('click', function() {
            document.getElementById('answerPage').value = this.dataset.page;
            document.getElementById('answerSearchForm').submit();
        });
    });
    const answer_sort = document.getElementById("answer_sort");
    answer_sort.addEventListener('change', function() {
        document.getElementById('answerSort').value = this.value;
        document.getElementById('answerPage').value = 0;
        document.getElementById('answerSearchForm').submit();
    });
</script>
</html>
