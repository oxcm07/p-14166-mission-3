<html layout:decorate="~{layout}">
<div layout:fragment="content" class="container my-3">
    <div class="my-3 border-bottom">
        <div>
            <h4>비밀번호 변경</h4>
        </div>
    </div>
    <div th:if="${param.success}" class="alert alert-success">
        비밀번호가 변경되었습니다.
    </div>
    <form th:action="@{/user/password/change}" th:object="${passwordChangeForm}" method="post">
        <div th:replace="~{form_errors :: formErrorsFragment}"></div>
        <div class="mb-3">
            <label for="currentPassword" class="form-label">기존 비밀번호</label>
            <input type="password" th:field="*{currentPassword}" class="form-control">
        </div>
        <div class="mb-3">
            <label for="newPassword1" class="form-label">새 비밀번호</label>
            <input type="password" th:field="*{newPassword1}" class="form-control">
        </div>
        <div class="mb-3">
            <label for="newPassword2" class="form-label">새 비밀번호 확인</label>
            <input type="password" th:field="*{newPassword2}" class="form-control">
        </div>
        <button type="submit" class="btn btn-primary">변경</button>
    </form>
</div>
</html>
