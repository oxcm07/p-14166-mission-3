<html layout:decorate="~{layout/base}">
<div layout:fragment="content" class="container my-3">
    <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-3">
        <h2 class="mb-0">최근 댓글</h2>
        <span class="text-muted small" th:text="|${paging.totalElements}개|"></span>
    </div>

    <div class="list-group" th:if="${!paging.isEmpty()}">
        <a class="list-group-item list-group-item-action"
           th:each="comment : ${paging}"
           th:with="targetQuestion=${commentTargetQuestionMap[comment.id]}"
           th:href="${targetQuestion != null} ? @{/question/{code}/detail/{number}(code=${questionCategoryCodeMap[targetQuestion.id]}, number=${questionNumberMap[targetQuestion.id]})} + '#comment_' + ${comment.id} : '#'">
            <div class="d-flex w-100 justify-content-between gap-3">
                <h6 class="mb-1 text-truncate"
                    th:text="${targetQuestion != null ? targetQuestion.subject : '연결된 글이 없습니다.'}"></h6>
                <small class="text-muted text-nowrap"
                       th:text="${#temporals.format(comment.createDate, 'yyyy-MM-dd HH:mm')}"></small>
            </div>
            <p class="mb-1 text-truncate" th:text="${comment.content}"></p>
            <div class="d-flex gap-2 small text-muted">
                <span th:if="${comment.author != null}" th:text="${comment.author.username}"></span>
                <span th:text="${comment.question != null ? '질문 댓글' : (comment.answer != null ? '답변 댓글' : '연결 없음')}"></span>
            </div>
        </a>
    </div>
    <div class="text-muted py-3" th:if="${paging.isEmpty()}">작성된 댓글이 없습니다.</div>

    <div th:if="${!paging.isEmpty()}">
        <ul class="pagination justify-content-center mt-3">
            <li class="page-item" th:classappend="${!paging.hasPrevious} ? 'disabled'">
                <a class="page-link" th:href="@{/comment/list(page=${paging.hasPrevious ? paging.number : 1})}">이전</a>
            </li>
            <li th:each="page : ${#numbers.sequence(0, paging.totalPages - 1)}"
                th:if="${page >= paging.number - 5 and page <= paging.number + 5}"
                th:classappend="${page == paging.number} ? 'active'"
                class="page-item">
                <a class="page-link" th:text="${page + 1}" th:href="@{/comment/list(page=${page + 1})}"></a>
            </li>
            <li class="page-item" th:classappend="${!paging.hasNext} ? 'disabled'">
                <a class="page-link" th:href="@{/comment/list(page=${paging.number + 2})}">다음</a>
            </li>
        </ul>
    </div>
</div>
</html>
